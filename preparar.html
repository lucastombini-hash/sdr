<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preparador de Reuniao — Trafega</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0C0F; --surface: #111318; --surface2: #181B22;
    --border: #1F2330; --border2: #272D3D;
    --green: #22C55E; --green2: #16A34A;
    --green-dim: rgba(34,197,94,0.08); --green-glow: rgba(34,197,94,0.15);
    --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
    --purple: #8B5CF6; --rose: #F43F5E; --gold: #EAB308;
    --text: #F1F5F9; --text2: #94A3B8; --text3: #475569;
    --fd: 'Syne', sans-serif; --fb: 'DM Sans', sans-serif;
    --r: 10px; --rl: 14px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--fb); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .app { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }
  header { padding: 28px 0 22px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .hdr { display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
  .logo-n { font-family: var(--fd); font-size: 19px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
  .logo-s { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; margin-top: 2px; }
  nav { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
  nav a { padding: 7px 13px; border-radius: 20px; font-size: 12px; text-decoration: none; border: 1px solid var(--border2); color: var(--text2); transition: all 0.2s; white-space: nowrap; }
  nav a:hover { border-color: var(--green); color: var(--green); }
  nav a.on { background: var(--green-dim); border-color: rgba(34,197,94,0.35); color: var(--green); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 16px 18px; margin-bottom: 10px; }
  .ct { font-family: var(--fd); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .ct::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
  textarea { width: 100%; min-height: 160px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--rl); padding: 14px 16px; font-family: var(--fb); font-size: 14px; color: var(--text); line-height: 1.7; outline: none; resize: vertical; }
  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: var(--text3); }
  .actions { display: flex; gap: 10px; margin-top: 10px; }
  .btn { flex: 1; padding: 11px 18px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; border-radius: var(--r); font-family: var(--fd); transition: all .2s; letter-spacing: 0.02em; }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost { flex: none; background: transparent; border: 1px solid var(--border2); border-radius: var(--r); padding: 11px 16px; color: var(--text2); font-size: 13px; cursor: pointer; font-family: var(--fb); transition: all .2s; }
  .btn-ghost:hover { border-color: var(--red); color: var(--red); }
  .btn-copy { background: transparent; border: 1px solid var(--border2); border-radius: var(--r); padding: 6px 13px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .2s; font-family: var(--fb); }
  .btn-copy:hover { border-color: var(--green); color: var(--green); }
  .loader { display: none; align-items: center; gap: 10px; padding: 12px 0; color: var(--text2); font-size: 13px; }
  .loader.on { display: flex; }
  .ldots { display: flex; gap: 4px; }
  .ld { width: 6px; height: 6px; border-radius: 50%; animation: bn 1.2s ease-in-out infinite; }
  .ld:nth-child(2){animation-delay:.15s;}.ld:nth-child(3){animation-delay:.3s;}
  @keyframes bn{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}
  .err { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--r); padding: 12px 15px; font-size: 13px; color: var(--red); display: none; margin-top: 10px; }
  #result { display: none; animation: fu .4s ease both; margin-top: 6px; }
  @keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .rh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .prose { font-size: 14px; color: var(--text2); line-height: 1.8; font-weight: 300; }
  .tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 20px; margin: 2px 3px 2px 0; }
  .li { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 7px; font-size: 14px; color: var(--text); line-height: 1.6; }
  .li:last-child { margin-bottom: 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  footer { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; }
  footer img { width: 18px; height: 18px; border-radius: 50%; opacity: 0.4; object-fit: cover; }
  footer span { font-size: 12px; color: var(--text3); }
  @media(max-width:600px){ nav a { font-size: 11px; padding: 6px 10px; } }
.btn-gold{background:var(--gold);color:#0A0C0F;}.btn-gold:hover{background:#CA8A04;}.ld{background:var(--gold);}.ph{border-radius:var(--rl);padding:20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:14px;}.ab{background:var(--bg);border-left:2px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:11px 14px;font-size:14px;line-height:1.7;color:var(--text);font-style:italic;}.pq{border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;}.ob{background:rgba(245,158,11,.04);border-left:2px solid var(--amber);border-radius:0 var(--r) var(--r) 0;padding:10px 13px;margin-bottom:7px;}.sn{background:var(--green-dim);border:1px solid rgba(34,197,94,.2);border-radius:var(--r);padding:13px 15px;font-size:14px;color:var(--text2);line-height:1.7;}.chk{display:flex;align-items:flex-start;gap:9px;margin-bottom:7px;font-size:14px;color:var(--text2);}.cb{width:15px;height:15px;border:1px solid var(--border2);border-radius:3px;flex-shrink:0;margin-top:2px;}
</style></head><body><div class="app">
<header><div class="hdr"><img src="/logo.png" class="logo" alt="Trafega"><div><div class="logo-n">Trafega</div><div class="logo-s" style="color:var(--gold)">Preparador de Reuniao</div></div></div></header>
<nav><a href="/index.html">↗ Resumo SDR</a><a href="/analisar.html">⬡ Analista SDR</a><a href="/preparar.html" class="on">◈ Prep. Reuniao</a><a href="/reuniao.html">◉ Analista Reuniao</a><a href="/painel.html">▦ Painel Comercial</a></nav>
<span class="lbl">Briefing do SDR</span>
<textarea id="si" placeholder="Cole aqui o briefing gerado pelo Resumo SDR ou descreva as informacoes do lead..."></textarea>
<div class="actions"><button class="btn btn-gold" id="bg" onclick="preparar()">◈ Preparar reuniao para o closer</button><button class="btn-ghost" onclick="document.getElementById('si').value='';document.getElementById('result').style.display='none'">Limpar</button></div>
<div class="loader" id="loader"><div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><span>Preparando roteiro...</span></div>
<div class="err" id="err"></div>
<div id="result"><div class="rh"><span style="font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)">◈ Roteiro para o closer</span><button class="btn-copy" onclick="copiar()">↗ Copiar roteiro</button></div><div id="rc"></div></div>
<footer><img src="/logo.png" alt=""><span>Trafega · Sistema Comercial</span></footer>
</div><script>
function se(m){var e=document.getElementById('err');e.textContent=m;e.style.display='block';}function li(a,c){return(a||[]).map(function(t){return'<div class="li"><span class="dot" style="background:'+c+'"></span><span>'+t+'</span></div>';}).join('');}
async function preparar(){var s=document.getElementById('si').value.trim();if(!s){se('Cole o briefing antes de continuar.');return;}
document.getElementById('err').style.display='none';document.getElementById('result').style.display='none';document.getElementById('loader').classList.add('on');document.getElementById('bg').disabled=true;try{var r=await fetch('/api/preparar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({briefing:s})});var d=await r.json();if(!r.ok)throw new Error(d.error||'Erro '+r.status);render(d);}catch(e){se('Erro: '+e.message);}document.getElementById('loader').classList.remove('on');document.getElementById('bg').disabled=false;}
function render(d){
  var ia=d.produto_recomendado==='AutoScale',pc=ia?'var(--green)':'var(--blue)',pb=ia?'var(--green-dim)':'rgba(59,130,246,.08)',pbo=ia?'rgba(34,197,94,.2)':'rgba(59,130,246,.2)';
  var h='<div class="ph" style="background:'+pb+';border:1px solid '+pbo+'">';
  h+='<div style="width:46px;height:46px;border-radius:var(--r);background:'+pb+';display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">'+(ia?'🔧':'📈')+'</div>';
  h+='<div style="flex:1"><div style="font-family:var(--fd);font-size:18px;font-weight:800;color:'+pc+'">'+(d.produto_recomendado||'')+'</div>';
  h+='<div style="font-size:13px;color:var(--text2);margin:3px 0 8px">'+(d.justificativa_produto||'')+'</div>';
  h+='<span class="tag" style="background:rgba(234,179,8,.12);color:var(--gold);border:1px solid rgba(234,179,8,.25)">★ Plano '+(d.plano_recomendado||'')+' — '+(d.justificativa_plano||'')+'</span></div></div>';
  h+='<div class="card"><div class="ct" style="color:var(--text2)">Resumo executivo</div><p class="prose">'+(d.resumo_executivo||'')+'</p></div>';
  h+='<div class="card"><div class="ct" style="color:var(--gold)">Como abrir a reuniao</div><div class="ab">"'+(d.abertura_sugerida||'')+'"</div></div>';
  if(d.perguntas_diagnostico&&d.perguntas_diagnostico.length){h+='<div class="card"><div class="ct" style="color:#93C5FD">Perguntas de diagnostico</div>';d.perguntas_diagnostico.forEach(function(p,i){h+='<div class="pq"><div style="font-size:14px;color:var(--text);margin-bottom:3px">'+(i+1)+'. '+p.pergunta+'</div><div style="font-size:12px;color:var(--text3)">Obj: '+p.objetivo+'</div></div>';});h+='</div>';}
  h+='<div class="card"><div class="ct" style="color:'+pc+'">Como apresentar a solucao</div><p class="prose">'+(d.como_apresentar_solucao||'')+'</p></div>';
  if(d.cases_para_usar&&d.cases_para_usar.length)h+='<div class="card"><div class="ct" style="color:var(--green)">Cases para usar</div>'+li(d.cases_para_usar,'var(--green)')+'</div>';
  if(d.objecoes_previstas&&d.objecoes_previstas.length){h+='<div class="card"><div class="ct" style="color:var(--amber)">Objecoes previstas</div>';d.objecoes_previstas.forEach(function(o){h+='<div class="ob"><div style="color:var(--amber);font-size:13px;font-weight:500;margin-bottom:4px">❝ '+o.objecao+'</div><div style="font-size:13px;color:var(--text2)">→ '+o.resposta+'</div></div>';});h+='</div>';}
  h+='<div class="card"><div class="ct" style="color:var(--gold)">Como apresentar o preco</div><p class="prose">'+(d.como_apresentar_preco||'')+'</p></div>';
  h+='<div class="card"><div class="ct" style="color:var(--green)">Sinal de fechamento</div><div class="sn">'+(d.sinal_de_fechamento||'')+'</div></div>';
  if(d.checklist_pre_reuniao&&d.checklist_pre_reuniao.length){h+='<div class="card"><div class="ct" style="color:#93C5FD">Checklist pre-reuniao</div>';d.checklist_pre_reuniao.forEach(function(c){h+='<div class="chk"><div class="cb"></div><span>'+c+'</span></div>';});h+='</div>';}
  if(d.alertas&&d.alertas.length){h+='<div class="card"><div class="ct" style="color:var(--amber)">Alertas</div>';d.alertas.forEach(function(a){h+='<div style="background:rgba(245,158,11,.06);border-left:2px solid var(--amber);border-radius:0 var(--r) var(--r) 0;padding:8px 12px;font-size:13px;color:var(--text2);margin-bottom:5px">⚠ '+a+'</div>';});h+='</div>';}
  window._r=JSON.stringify(d,null,2);document.getElementById('rc').innerHTML=h;document.getElementById('result').style.display='block';document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}
function copiar(){if(!window._r)return;var b=document.querySelector('.btn-copy');function fb(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');b.textContent='✓ Copiado!';}catch(e){}document.body.removeChild(ta);setTimeout(function(){b.textContent='↗ Copiar roteiro';},2000);}if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(window._r).then(function(){b.textContent='✓ Copiado!';setTimeout(function(){b.textContent='↗ Copiar roteiro';},2000);}).catch(function(){fb(window._r);})}else{fb(window._r)}}
</script></body></html>
