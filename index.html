<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Resumo SDR — Trafega</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0C0F; --surface: #111318; --surface2: #181B22;
    --border: #1F2330; --border2: #272D3D;
    --green: #22C55E; --green2: #16A34A;
    --green-dim: rgba(34,197,94,0.08); --green-glow: rgba(34,197,94,0.15);
    --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
    --purple: #8B5CF6; --rose: #F43F5E; --gold: #EAB308;
    --text: #F1F5F9; --text2: #94A3B8; --text3: #475569;
    --fd: 'Syne', sans-serif; --fb: 'DM Sans', sans-serif;
    --r: 10px; --rl: 14px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--fb); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .app { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }
  header { padding: 28px 0 22px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .hdr { display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
  .logo-n { font-family: var(--fd); font-size: 19px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
  .logo-s { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; margin-top: 2px; }
  nav { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
  nav a { padding: 7px 13px; border-radius: 20px; font-size: 12px; text-decoration: none; border: 1px solid var(--border2); color: var(--text2); transition: all 0.2s; white-space: nowrap; }
  nav a:hover { border-color: var(--green); color: var(--green); }
  nav a.on { background: var(--green-dim); border-color: rgba(34,197,94,0.35); color: var(--green); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 16px 18px; margin-bottom: 10px; }
  .ct { font-family: var(--fd); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .ct::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
  textarea { width: 100%; min-height: 160px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--rl); padding: 14px 16px; font-family: var(--fb); font-size: 14px; color: var(--text); line-height: 1.7; outline: none; resize: vertical; }
  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: var(--text3); }
  .actions { display: flex; gap: 10px; margin-top: 10px; }
  .btn { flex: 1; padding: 11px 18px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; border-radius: var(--r); font-family: var(--fd); transition: all .2s; letter-spacing: 0.02em; }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost { flex: none; background: transparent; border: 1px solid var(--border2); border-radius: var(--r); padding: 11px 16px; color: var(--text2); font-size: 13px; cursor: pointer; font-family: var(--fb); transition: all .2s; }
  .btn-ghost:hover { border-color: var(--red); color: var(--red); }
  .btn-copy { background: transparent; border: 1px solid var(--border2); border-radius: var(--r); padding: 6px 13px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .2s; font-family: var(--fb); }
  .btn-copy:hover { border-color: var(--green); color: var(--green); }
  .loader { display: none; align-items: center; gap: 10px; padding: 12px 0; color: var(--text2); font-size: 13px; }
  .loader.on { display: flex; }
  .ldots { display: flex; gap: 4px; }
  .ld { width: 6px; height: 6px; border-radius: 50%; animation: bn 1.2s ease-in-out infinite; }
  .ld:nth-child(2){animation-delay:.15s;}.ld:nth-child(3){animation-delay:.3s;}
  @keyframes bn{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}
  .err { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--r); padding: 12px 15px; font-size: 13px; color: var(--red); display: none; margin-top: 10px; }
  #result { display: none; animation: fu .4s ease both; margin-top: 6px; }
  @keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .rh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .prose { font-size: 14px; color: var(--text2); line-height: 1.8; font-weight: 300; }
  .tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 20px; margin: 2px 3px 2px 0; }
  .li { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 7px; font-size: 14px; color: var(--text); line-height: 1.6; }
  .li:last-child { margin-bottom: 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  footer { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; }
  footer img { width: 18px; height: 18px; border-radius: 50%; opacity: 0.4; object-fit: cover; }
  footer span { font-size: 12px; color: var(--text3); }
  @media(max-width:600px){ nav a { font-size: 11px; padding: 6px 10px; } }

.btn-green{background:var(--green);color:#0A0C0F;}.btn-green:hover{background:var(--green2);box-shadow:0 6px 20px var(--green-glow);}.ld{background:var(--green);}.sc{background:var(--surface2);border-radius:var(--r);padding:11px 13px;}.scl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}.scv{font-family:var(--fd);font-size:20px;font-weight:700;}.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px;}.gancho{background:var(--bg);border-left:2px solid var(--green);border-radius:0 var(--r) var(--r) 0;padding:11px 14px;font-size:14px;line-height:1.7;color:var(--text);font-style:italic;}.alrt{background:rgba(245,158,11,.06);border-left:2px solid var(--amber);border-radius:0 var(--r) var(--r) 0;padding:9px 13px;font-size:13px;color:var(--text2);margin-bottom:6px;}
</style></head><body><div class="app">
<header><div class="hdr"><img src="/logo.png" class="logo" alt="Trafega"><div><div class="logo-n">Trafega</div><div class="logo-s" style="color:var(--green)">Resumo SDR</div></div></div></header>
<nav><a href="/index.html" class="on">↗ Resumo SDR</a><a href="/analisar.html">⬡ Analista SDR</a><a href="/preparar.html">◈ Prep. Reuniao</a><a href="/reuniao.html">◉ Analista Reuniao</a><a href="/painel.html">▦ Painel Comercial</a></nav>
<span class="lbl">Transcricao da ligacao</span>
<textarea id="si" placeholder="Cole aqui o script ou transcricao da ligacao de qualificacao..."></textarea>
<div class="actions"><button class="btn btn-green" id="bg" onclick="gerar()">↗ Gerar briefing para o closer</button><button class="btn-ghost" onclick="document.getElementById('si').value='';document.getElementById('result').style.display='none'">Limpar</button></div>
<div class="loader" id="loader"><div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><span>Analisando ligacao...</span></div>
<div class="err" id="err"></div>
<div id="result"><div class="rh"><span style="font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--green)">✦ Briefing para o closer</span><button class="btn-copy" onclick="copiar()">↗ Copiar tudo</button></div><div id="rc"></div></div>
<footer><img src="/logo.png" alt=""><span>Trafega · Sistema Comercial</span></footer>
</div><script>
function se(m){var e=document.getElementById('err');e.textContent=m;e.style.display='block';}
function cor(n){return n>=8?'var(--green)':n>=6?'var(--amber)':'var(--red)';}
function ts(a,c){return(a||[]).map(function(t){return'<span class="tag" style="'+c+'">'+t+'</span>';}).join('');}
function li(a,c){return(a||[]).map(function(t){return'<div class="li"><span class="dot" style="background:'+c+'"></span><span>'+t+'</span></div>';}).join('');}
function bst(b){return b==='Confirmado'||b==='Pronto para investir'?'background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)':b==='Sem budget'?'background:rgba(239,68,68,.1);color:#FCA5A5;border:1px solid rgba(239,68,68,.2)':'background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2)';}
function tst(t){return t==='Quente'?'background:rgba(239,68,68,.12);color:#FCA5A5;border:1px solid rgba(239,68,68,.2)':t==='Morno'?'background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2)':'background:rgba(59,130,246,.1);color:#93C5FD;border:1px solid rgba(59,130,246,.2)';}
async function gerar(){
  var s=document.getElementById('si').value.trim();if(!s){se('Cole a transcricao antes de gerar.');return;}
  document.getElementById('err').style.display='none';document.getElementById('result').style.display='none';
  document.getElementById('loader').classList.add('on');document.getElementById('bg').disabled=true;
  try{var r=await fetch('/api/resumo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({script:s})});var d=await r.json();if(!r.ok)throw new Error(d.error||'Erro '+r.status);render(d);}catch(e){se('Erro: '+e.message);}
  document.getElementById('loader').classList.remove('on');document.getElementById('bg').disabled=false;
}
function render(d){
  var nc=cor(d.score||0),ini=(d.nome_lead||'?').split(' ').slice(0,2).map(function(n){return n[0];}).join('').toUpperCase();
  var h='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
  h+='<div style="width:46px;height:46px;border-radius:50%;background:var(--green-dim);border:1px solid rgba(34,197,94,.2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:700;font-size:14px;color:var(--green);flex-shrink:0">'+ini+'</div>';
  h+='<div><div style="font-size:15px;font-weight:500">'+(d.nome_lead||'—')+'</div><div style="font-size:12px;color:var(--text2)">'+(d.cargo||'')+(d.empresa?' · '+d.empresa:'')+(d.cidade?' · '+d.cidade:'')+'</div></div>';
  h+='<span class="tag" style="'+tst(d.temperatura)+';margin-left:auto">'+(d.temperatura||'—')+'</span></div>';
  h+='<div class="sgrid"><div class="sc"><div class="scl">Score</div><div class="scv" style="color:'+nc+'">'+(d.score||0)+'<span style="font-size:12px;color:var(--text3)">/10</span></div></div>';
  h+='<div class="sc"><div class="scl">Urgencia</div><div class="scv" style="color:'+cor(d.urgencia||0)+'">'+(d.urgencia||0)+'<span style="font-size:12px;color:var(--text3)">/10</span></div></div>';
  h+='<div class="sc"><div class="scl">Faturamento</div><div style="font-size:13px;font-weight:500;color:var(--text);padding-top:4px">'+(d.faturamento_atual||'—')+'</div></div>';
  h+='<div class="sc"><div class="scl">Budget</div><div style="padding-top:4px"><span class="tag" style="'+bst(d.budget)+'">'+(d.budget||'—')+'</span></div></div></div>';
  h+='<div class="card"><div class="ct" style="color:var(--green)">Contexto</div><p class="prose">'+(d.contexto||'')+'</p></div>';
  h+='<div class="card"><div class="ct" style="color:var(--red)">Dores</div>'+ts(d.dores,'background:rgba(239,68,68,.1);color:#FCA5A5;border:1px solid rgba(239,68,68,.2)')+'</div>';
  h+='<div class="card"><div class="ct" style="color:var(--green)">Desejos</div>'+ts(d.desejos,'background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)')+'</div>';
  h+='<div class="card"><div class="ct" style="color:#93C5FD">Necessidades</div>'+ts(d.necessidades,'background:rgba(59,130,246,.1);color:#93C5FD;border:1px solid rgba(59,130,246,.2)')+'</div>';
  if(d.objecoes&&d.objecoes.length)h+='<div class="card"><div class="ct" style="color:var(--amber)">Objecoes</div>'+ts(d.objecoes,'background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2)')+'</div>';
  h+='<div class="card"><div class="ct" style="color:var(--green)">Gancho para o closer</div><div class="gancho">"'+(d.gancho_closer||'')+'"</div></div>';
  if(d.alertas&&d.alertas.length){h+='<div class="card"><div class="ct" style="color:var(--amber)">Alertas</div>';d.alertas.forEach(function(a){h+='<div class="alrt">⚠ '+a+'</div>';});h+='</div>';}
  window._r=JSON.stringify(d,null,2);document.getElementById('rc').innerHTML=h;document.getElementById('result').style.display='block';document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}
function copiar(){if(!window._r)return;var b=document.querySelector('.btn-copy');function fb(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');b.textContent='✓ Copiado!';}catch(e){}document.body.removeChild(ta);setTimeout(function(){b.textContent='↗ Copiar tudo';},2000);}if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(window._r).then(function(){b.textContent='✓ Copiado!';setTimeout(function(){b.textContent='↗ Copiar tudo';},2000);}).catch(function(){fb(window._r);})}else{fb(window._r)}}
</script></body></html>
