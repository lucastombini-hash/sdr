<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analista de Ligacao SDR — Trafega</title>


<style>

  :root {
    --bg: #0A0C0F;
    --surface: #111318;
    --surface2: #181B22;
    --border: #1F2330;
    --border2: #272D3D;
    --green: #22C55E;
    --green2: #16A34A;
    --green-glow: rgba(34,197,94,0.15);
    --green-dim: rgba(34,197,94,0.08);
    --red: #EF4444;
    --amber: #F59E0B;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --rose: #F43F5E;
    --gold: #EAB308;
    --text: #F1F5F9;
    --text2: #94A3B8;
    --text3: #475569;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-lg: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .app { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }
  header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .header-inner { display: flex; align-items: center; gap: 14px; }
  .logo-img { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; }
  .logo-text { display: flex; flex-direction: column; }
  .logo-name { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .nav { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .nav a { padding: 7px 14px; border-radius: 20px; font-size: 12px; text-decoration: none; border: 1px solid var(--border2); color: var(--text2); font-family: var(--font-body); transition: all 0.2s; }
  .nav a:hover { border-color: var(--green); color: var(--green); }
  .nav a.active { background: var(--green-dim); border-color: rgba(34,197,94,0.35); color: var(--green); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px; }
  .card-title { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
  .card-title::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  label, .lbl { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
  input, select, textarea { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-family: var(--font-body); outline: none; transition: border-color .2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--green); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .btn-green { width: 100%; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--green); color: #0A0C0F; border: none; border-radius: var(--radius); font-family: var(--font-display); transition: all .2s; letter-spacing: 0.02em; }
  .btn-green:hover { background: var(--green2); transform: translateY(-1px); }
  .btn-green:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: var(--radius); padding: 9px 16px; font-size: 13px; cursor: pointer; font-family: var(--font-body); transition: all .2s; }
  .btn-ghost:hover { border-color: var(--green); color: var(--green); }
  .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--red); border-radius: var(--radius); padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: var(--font-body); }
  .btn-danger:hover { border-color: var(--red); }
  .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .b-sdr { background: rgba(59,130,246,0.12); color: #60A5FA; border: 1px solid rgba(59,130,246,0.2); }
  .b-closer { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .b-head { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--green); flex-shrink: 0; }
  .metric { background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
  .metric-val { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); }
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap: 10px; margin-bottom: 14px; }
  .pbar { height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .pfill { height: 100%; border-radius: 2px; }
  .conv-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .conv-row:last-child { border-bottom: none; }
  .member-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child { border-bottom: none; }
  .member-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px; }
  .member-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .feedback { font-size: 13px; color: var(--green); text-align: center; margin-top: 10px; display: none; }
  .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--red); display: none; margin-top: 10px; }
  footer { margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; }
  footer img { width: 20px; height: 20px; border-radius: 50%; opacity: 0.5; }
  footer span { font-size: 12px; color: var(--text3); }
  .loader { display: none; align-items: center; gap: 10px; padding: 16px 0; color: var(--text2); font-size: 13px; }
  .loader.on { display: flex; }
  .ldots { display: flex; gap: 4px; }
  .ld { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: bounce 1.2s ease-in-out infinite; }
  .ld:nth-child(2){animation-delay:.15s;}.ld:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}
  @media(max-width:600px){.row2{grid-template-columns:1fr;}}

</style>

<script>
function limpar() {
  document.getElementById('scriptInput').value = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
}

function showError(msg) {
  var el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function cor(nota) {
  if (nota >= 8) return '#00E5A0';
  if (nota >= 6) return '#FFB547';
  return '#FF4D6A';
}

function classifStyle(c) {
  if (c === 'Excelente') return 'background:rgba(0,229,160,0.12);color:#00E5A0;border:1px solid rgba(0,229,160,0.25)';
  if (c === 'Bom') return 'background:rgba(77,158,255,0.12);color:#4D9EFF;border:1px solid rgba(77,158,255,0.25)';
  if (c === 'Regular') return 'background:rgba(255,181,71,0.12);color:#FFB547;border:1px solid rgba(255,181,71,0.25)';
  if (c === 'Precisa melhorar') return 'background:rgba(255,77,106,0.12);color:#FF4D6A;border:1px solid rgba(255,77,106,0.25)';
  return 'background:rgba(255,77,106,0.18);color:#FF4D6A;border:1px solid rgba(255,77,106,0.3)';
}

function bantLabel(b) { return b ? 'Identificado' : 'Nao identificado'; }
function bantStyle(b) { return b ? 'background:rgba(0,229,160,0.1);color:#00E5A0' : 'background:rgba(255,77,106,0.1);color:#FF4D6A'; }

function listItems(arr, color) {
  return (arr||[]).map(function(t) {
    return '<div class="list-item"><span class="list-bullet" style="background:' + color + '"></span><span>' + t + '</span></div>';
  }).join('');
}

function etapas(arr, icon, color) {
  if (!arr || !arr.length) return '<span style="font-size:13px;color:var(--text3)">Nenhuma</span>';
  return arr.map(function(e) {
    return '<div class="etapa-row"><span class="etapa-icon" style="color:' + color + '">' + icon + '</span><span>' + e + '</span></div>';
  }).join('');
}

async function analisar() {
  var script = document.getElementById('scriptInput').value.trim();
  if (!script) { showError('Cole a transcricao da ligacao antes de analisar.'); return; }

  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('loader').classList.add('active');
  document.getElementById('btnAnalyze').disabled = true;

  try {
    var res = await fetch('/api/analisar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ script: script })
    });

    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ' + res.status);
    renderResult(data);
  } catch(e) {
    showError('Erro: ' + e.message);
  }

  document.getElementById('loader').classList.remove('active');
  document.getElementById('btnAnalyze').disabled = false;
}

function renderResult(d) {
  var b = d.bant || {};
  var as = d.aderencia_script || {};
  var notaCor = cor(d.nota_geral || 0);

  var html = '';

  // SCORE HERO
  html += '<div class="score-hero">';
  html += '<div class="score-circle" style="border-color:' + notaCor + ';background:' + notaCor + '18">';
  html += '<span class="score-number" style="color:' + notaCor + '">' + (d.nota_geral || 0) + '</span>';
  html += '<span class="score-max">/10</span></div>';
  html += '<div class="score-info">';
  html += '<div class="score-name">' + (d.nome_sdr || 'SDR') + '</div>';
  html += '<div class="score-lead">Lead: ' + (d.nome_lead || 'Nao identificado') + '</div>';
  html += '<span class="classif-badge" style="' + classifStyle(d.classificacao) + '">' + (d.classificacao || '—') + '</span>';
  html += '</div></div>';

  // BANT
  html += '<div class="bant-grid">';
  var bantKeys = [
    { key: 'budget', label: 'B — Budget' },
    { key: 'authority', label: 'A — Authority' },
    { key: 'need', label: 'N — Need' },
    { key: 'timeline', label: 'T — Timeline' }
  ];
  bantKeys.forEach(function(item) {
    var bc = b[item.key] || {};
    var nc = cor(bc.nota || 0);
    html += '<div class="bant-card">';
    html += '<div class="bant-header"><span class="bant-label" style="color:' + nc + '">' + item.label + '</span>';
    html += '<span class="bant-nota" style="color:' + nc + '">' + (bc.nota || 0) + '<span style="font-size:12px;color:var(--text3)">/10</span></span></div>';
    html += '<span class="bant-badge" style="' + bantStyle(bc.identificado) + '">' + bantLabel(bc.identificado) + '</span>';
    html += '<div class="bant-obs">' + (bc.observacao || '') + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // ADERENCIA AO SCRIPT
  html += '<div class="script-card">';
  html += '<div class="script-header"><span class="script-title">Aderencia ao script</span>';
  html += '<span class="script-nota" style="color:' + cor(as.nota||0) + '">' + (as.nota||0) + '<span style="font-size:13px;color:var(--text3)">/10</span></span></div>';
  html += '<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Etapas seguidas</div>';
  html += etapas(as.etapas_seguidas, '✓', '#00E5A0') + '</div>';
  html += '<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Etapas puladas</div>';
  html += etapas(as.etapas_puladas, '✗', '#FF4D6A') + '</div>';
  if (as.etapas_fora_de_ordem && as.etapas_fora_de_ordem.length) {
    html += '<div><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">Fora de ordem</div>';
    html += etapas(as.etapas_fora_de_ordem, '~', '#FFB547') + '</div>';
  }
  html += '</div>';

  // PONTOS POSITIVOS
  html += '<div class="card"><div class="card-title"><span class="dot" style="background:#00E5A0"></span>Pontos positivos</div>';
  html += listItems(d.pontos_positivos, '#00E5A0') + '</div>';

  // FALHAS
  html += '<div class="card"><div class="card-title"><span class="dot" style="background:#FF4D6A"></span>Falhas identificadas</div>';
  html += listItems(d.falhas, '#FF4D6A') + '</div>';

  // O QUE CORRIGIR
  html += '<div class="card"><div class="card-title"><span class="dot" style="background:#FFB547"></span>O que deve ser corrigido</div>';
  html += listItems(d.o_que_corrigir, '#FFB547') + '</div>';

  // COMO MELHORAR
  html += '<div class="card"><div class="card-title"><span class="dot" style="background:#4D9EFF"></span>Como melhorar</div>';
  html += listItems(d.como_melhorar, '#4D9EFF') + '</div>';

  // ROLEPLAY
  html += '<div class="roleplay-box">';
  html += '<div class="roleplay-label">🎭 Sugestao de roleplay</div>';
  html += '<div class="roleplay-text">' + (d.sugestao_roleplay || '') + '</div></div>';

  // COACH
  html += '<div class="coach-box"><div class="coach-label">💬 Feedback do gestor</div>';
  html += '<div class="coach-text">' + (d.resumo_coach || '') + '</div></div>';

  window._lastReport = buildTextReport(d);
  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildTextReport(d) {
  var b = d.bant || {};
  var as = d.aderencia_script || {};
  function list(arr) { return (arr||[]).map(function(x){return '• '+x;}).join('\n'); }
  return [
    'ANALISE DE LIGACAO SDR — TRAFEGA',
    'SDR: ' + (d.nome_sdr||'—') + ' | Lead: ' + (d.nome_lead||'—'),
    'Nota geral: ' + (d.nota_geral||0) + '/10 | ' + (d.classificacao||''),
    '',
    'BANT:',
    'Budget: ' + (b.budget&&b.budget.nota||0) + '/10 — ' + (b.budget&&b.budget.observacao||''),
    'Authority: ' + (b.authority&&b.authority.nota||0) + '/10 — ' + (b.authority&&b.authority.observacao||''),
    'Need: ' + (b.need&&b.need.nota||0) + '/10 — ' + (b.need&&b.need.observacao||''),
    'Timeline: ' + (b.timeline&&b.timeline.nota||0) + '/10 — ' + (b.timeline&&b.timeline.observacao||''),
    '',
    'ADERENCIA AO SCRIPT: ' + (as.nota||0) + '/10',
    'Seguidas: ' + (as.etapas_seguidas||[]).join(', '),
    'Puladas: ' + (as.etapas_puladas||[]).join(', '),
    '',
    'PONTOS POSITIVOS:\n' + list(d.pontos_positivos),
    '',
    'FALHAS:\n' + list(d.falhas),
    '',
    'O QUE CORRIGIR:\n' + list(d.o_que_corrigir),
    '',
    'COMO MELHORAR:\n' + list(d.como_melhorar),
    '',
    'SUGESTAO DE ROLEPLAY:\n' + (d.sugestao_roleplay||''),
    '',
    'FEEDBACK DO GESTOR:\n' + (d.resumo_coach||'')
  ].join('\n');
}

function copiarTudo() {
  if (!window._lastReport) return;
  var btn = document.querySelector('.btn-copy-all');
  function fallback(txt) {
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed'; ta.style.top = '-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); btn.textContent = '✓ Copiado!'; } catch(e) { btn.textContent = 'Erro'; }
    document.body.removeChild(ta);
    setTimeout(function(){ btn.textContent = '↗ Copiar relatorio'; }, 2000);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(window._lastReport)
      .then(function(){ btn.textContent = '✓ Copiado!'; setTimeout(function(){ btn.textContent = '↗ Copiar relatorio'; }, 2000); })
      .catch(function(){ fallback(window._lastReport); });
  } else { fallback(window._lastReport); }
}
</script>
