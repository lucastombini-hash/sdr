<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Analista SDR — Trafega</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0C0F; --surface: #111318; --surface2: #181B22;
    --border: #1F2330; --border2: #272D3D;
    --green: #22C55E; --green2: #16A34A;
    --green-dim: rgba(34,197,94,0.08); --green-glow: rgba(34,197,94,0.15);
    --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
    --purple: #8B5CF6; --rose: #F43F5E; --gold: #EAB308;
    --text: #F1F5F9; --text2: #94A3B8; --text3: #475569;
    --fd: 'Syne', sans-serif; --fb: 'DM Sans', sans-serif;
    --r: 10px; --rl: 14px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--fb); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .app { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }
  header { padding: 28px 0 22px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .hdr { display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
  .logo-n { font-family: var(--fd); font-size: 19px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
  .logo-s { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; margin-top: 2px; }
  nav { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
  nav a { padding: 7px 13px; border-radius: 20px; font-size: 12px; text-decoration: none; border: 1px solid var(--border2); color: var(--text2); transition: all 0.2s; white-space: nowrap; }
  nav a:hover { border-color: var(--green); color: var(--green); }
  nav a.on { background: var(--green-dim); border-color: rgba(34,197,94,0.35); color: var(--green); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 16px 18px; margin-bottom: 10px; }
  .ct { font-family: var(--fd); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .ct::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
  textarea { width: 100%; min-height: 160px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--rl); padding: 14px 16px; font-family: var(--fb); font-size: 14px; color: var(--text); line-height: 1.7; outline: none; resize: vertical; }
  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: var(--text3); }
  .actions { display: flex; gap: 10px; margin-top: 10px; }
  .btn { flex: 1; padding: 11px 18px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; border-radius: var(--r); font-family: var(--fd); transition: all .2s; letter-spacing: 0.02em; }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost { flex: none; background: transparent; border: 1px solid var(--border2); border-radius: var(--r); padding: 11px 16px; color: var(--text2); font-size: 13px; cursor: pointer; font-family: var(--fb); transition: all .2s; }
  .btn-ghost:hover { border-color: var(--red); color: var(--red); }
  .btn-copy { background: transparent; border: 1px solid var(--border2); border-radius: var(--r); padding: 6px 13px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .2s; font-family: var(--fb); }
  .btn-copy:hover { border-color: var(--green); color: var(--green); }
  .loader { display: none; align-items: center; gap: 10px; padding: 12px 0; color: var(--text2); font-size: 13px; }
  .loader.on { display: flex; }
  .ldots { display: flex; gap: 4px; }
  .ld { width: 6px; height: 6px; border-radius: 50%; animation: bn 1.2s ease-in-out infinite; }
  .ld:nth-child(2){animation-delay:.15s;}.ld:nth-child(3){animation-delay:.3s;}
  @keyframes bn{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}
  .err { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--r); padding: 12px 15px; font-size: 13px; color: var(--red); display: none; margin-top: 10px; }
  #result { display: none; animation: fu .4s ease both; margin-top: 6px; }
  @keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .rh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .prose { font-size: 14px; color: var(--text2); line-height: 1.8; font-weight: 300; }
  .tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 20px; margin: 2px 3px 2px 0; }
  .li { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 7px; font-size: 14px; color: var(--text); line-height: 1.6; }
  .li:last-child { margin-bottom: 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  footer { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; }
  footer img { width: 18px; height: 18px; border-radius: 50%; opacity: 0.4; object-fit: cover; }
  footer span { font-size: 12px; color: var(--text3); }
  @media(max-width:600px){ nav a { font-size: 11px; padding: 6px 10px; } }
.btn-purple{background:var(--purple);color:#fff;}.btn-purple:hover{background:#7C3AED;}.ld{background:var(--purple);}.bh{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}.bc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;}.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;}.etapa{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:13px;color:var(--text2);}.coach{background:var(--surface2);border-left:3px solid var(--purple);border-radius:0 var(--rl) var(--rl) 0;padding:14px 16px;margin-bottom:10px;}.rplay{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;}
</style></head><body><div class="app">
<header><div class="hdr"><img src="/logo.png" class="logo" alt="Trafega"><div><div class="logo-n">Trafega</div><div class="logo-s" style="color:var(--purple)">Analista de Ligacao SDR</div></div></div></header>
<nav><a href="/index.html">↗ Resumo SDR</a><a href="/analisar.html" class="on">⬡ Analista SDR</a><a href="/preparar.html">◈ Prep. Reuniao</a><a href="/reuniao.html">◉ Analista Reuniao</a><a href="/painel.html">▦ Painel Comercial</a></nav>
<span class="lbl">Transcricao da ligacao</span>
<textarea id="si" placeholder="Cole aqui a transcricao da ligacao de qualificacao do SDR..."></textarea>
<div class="actions"><button class="btn btn-purple" id="bg" onclick="analisar()">⬡ Analisar performance do SDR</button><button class="btn-ghost" onclick="document.getElementById('si').value='';document.getElementById('result').style.display='none'">Limpar</button></div>
<div class="loader" id="loader"><div class="ldots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><span>Analisando ligacao...</span></div>
<div class="err" id="err"></div>
<div id="result"><div class="rh"><span style="font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--purple)">⬡ Analise de Performance</span><button class="btn-copy" onclick="copiar()">↗ Copiar relatorio</button></div><div id="rc"></div></div>
<footer><img src="/logo.png" alt=""><span>Trafega · Sistema Comercial</span></footer>
</div><script>
function se(m){var e=document.getElementById('err');e.textContent=m;e.style.display='block';}function cor(n){return n>=8?'var(--green)':n>=6?'var(--amber)':'var(--red)';}function li(a,c){return(a||[]).map(function(t){return'<div class="li"><span class="dot" style="background:'+c+'"></span><span>'+t+'</span></div>';}).join('');}
function cs(c){return c==='Excelente'?'background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.2)':c==='Bom'?'background:rgba(59,130,246,.1);color:#93C5FD;border:1px solid rgba(59,130,246,.2)':c==='Regular'?'background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2)':'background:rgba(239,68,68,.1);color:#FCA5A5;border:1px solid rgba(239,68,68,.2)';}
function bb(b){return b?'background:var(--green-dim);color:var(--green)':'background:rgba(239,68,68,.1);color:#FCA5A5';}
function etapas(arr,ic,co){if(!arr||!arr.length)return'<span style="font-size:13px;color:var(--text3)">Nenhuma</span>';return arr.map(function(e){return'<div class="etapa"><span style="color:'+co+'">'+ic+'</span><span>'+e+'</span></div>';}).join('');}
async function analisar(){var s=document.getElementById('si').value.trim();if(!s){se('Cole a transcricao antes de analisar.');return;}
document.getElementById('err').style.display='none';document.getElementById('result').style.display='none';document.getElementById('loader').classList.add('on');document.getElementById('bg').disabled=true;try{var r=await fetch('/api/analisar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({script:s})});var d=await r.json();if(!r.ok)throw new Error(d.error||'Erro '+r.status);render(d);}catch(e){se('Erro: '+e.message);}document.getElementById('loader').classList.remove('on');document.getElementById('bg').disabled=false;}
function buildText(d){
  var sep="\n"+"─".repeat(40)+"\n";
  var nc=d.notas_por_criterio||{};
  var lines=[];
  lines.push("ANÁLISE DE LIGAÇÃO SDR — TRAFEGA");
  lines.push("━".repeat(40));
  lines.push("SDR: "+(d.nome_sdr||"—")+" | Lead: "+(d.nome_lead||"—"));
  lines.push("Nota geral: "+(d.nota_geral||0)+"/10 | "+(d.classificacao||""));
  lines.push(sep);
  lines.push("BANT");
  var b=d.bant||{};
  ["budget","authority","need","timeline"].forEach(function(k){
    var bc2=b[k]||{};
    lines.push("  "+k.toUpperCase()+": "+(bc2.nota||0)+"/10 — "+(bc2.identificado?"Identificado":"Não identificado"));
    if(bc2.observacao)lines.push("    "+bc2.observacao);
  });
  var as=d.aderencia_script||{};
  lines.push(sep);
  lines.push("ADERÊNCIA AO SCRIPT: "+(as.nota||0)+"/10");
  if(as.etapas_seguidas&&as.etapas_seguidas.length){lines.push("  Seguidas:");(as.etapas_seguidas||[]).forEach(function(x){lines.push("    ✓ "+x);});}
  if(as.etapas_puladas&&as.etapas_puladas.length){lines.push("  Puladas:");(as.etapas_puladas||[]).forEach(function(x){lines.push("    ✗ "+x);});}
  lines.push(sep);
  lines.push("PONTOS POSITIVOS");
  (d.pontos_positivos||[]).forEach(function(x){lines.push("  • "+x);});
  lines.push("");
  lines.push("FALHAS IDENTIFICADAS");
  (d.falhas||[]).forEach(function(x){lines.push("  • "+x);});
  lines.push("");
  lines.push("O QUE CORRIGIR");
  (d.o_que_corrigir||[]).forEach(function(x){lines.push("  • "+x);});
  lines.push("");
  lines.push("COMO MELHORAR");
  (d.como_melhorar||[]).forEach(function(x){lines.push("  • "+x);});
  if(d.objecoes_identificadas&&d.objecoes_identificadas.length){
    lines.push(sep);
    lines.push("OBJEÇÕES IDENTIFICADAS");
    d.objecoes_identificadas.forEach(function(o){
      lines.push("  ❝ "+o.objecao);
      lines.push("    Como tratou: "+o.como_foi_tratada);
    });
  }
  lines.push(sep);
  lines.push("SUGESTÃO DE ROLEPLAY");
  lines.push(d.sugestao_roleplay||"");
  lines.push(sep);
  lines.push("FEEDBACK DO GESTOR");
  lines.push(d.resumo_coach||"");
  return lines.join("\n");
}
function render(d){
  var b=d.bant||{};var as=d.aderencia_script||{};var nc=cor(d.nota_geral||0);
  var ini=(d.nome_sdr||'?').split(' ').slice(0,2).map(function(n){return n[0];}).join('').toUpperCase();
  var h='<div class="bh"><div style="width:64px;height:64px;border-radius:50%;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:2px solid '+nc+'"><span style="font-family:var(--fd);font-size:22px;font-weight:800;color:'+nc+'">'+(d.nota_geral||0)+'</span><span style="font-size:11px;color:var(--text3)">/10</span></div>';
  h+='<div style="flex:1"><div style="font-size:15px;font-weight:500;color:var(--text)">'+(d.nome_sdr||'SDR')+'</div><div style="font-size:13px;color:var(--text2)">Lead: '+(d.nome_lead||'—')+'</div><span class="tag" style="'+cs(d.classificacao)+';margin-top:5px;display:inline-block">'+(d.classificacao||'—')+'</span></div></div>';
  var bk=[{k:'budget',l:'B — Budget'},{k:'authority',l:'A — Authority'},{k:'need',l:'N — Need'},{k:'timeline',l:'T — Timeline'}];
  h+='<div class="bgrid">';
  bk.forEach(function(item){var bc2=b[item.k]||{};var nc2=cor(bc2.nota||0);h+='<div class="bc"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:11px;font-weight:600;color:'+nc2+'">'+item.l+'</span><span style="font-family:var(--fd);font-size:17px;font-weight:700;color:'+nc2+'">'+(bc2.nota||0)+'</span></div><span class="tag" style="'+bb(bc2.identificado)+';display:inline-block;margin-bottom:5px">'+(bc2.identificado?'Identificado':'Nao identificado')+'</span><div style="font-size:12px;color:var(--text3);line-height:1.5">'+(bc2.observacao||'')+'</div></div>';});
  h+='</div>';
  h+='<div class="sc"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span class="ct" style="color:var(--purple);margin-bottom:0">Aderencia ao script</span><span style="font-family:var(--fd);font-size:19px;font-weight:700;color:'+cor(as.nota||0)+'">'+(as.nota||0)+'/10</span></div>';
  h+='<div style="margin-bottom:8px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Seguidas</div>'+etapas(as.etapas_seguidas,'✓','var(--green)')+'</div>';
  h+='<div><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Puladas</div>'+etapas(as.etapas_puladas,'✗','var(--red)')+'</div></div>';
  h+='<div class="card"><div class="ct" style="color:var(--green)">Pontos positivos</div>'+li(d.pontos_positivos,'var(--green)')+'</div>';
  h+='<div class="card"><div class="ct" style="color:var(--red)">Falhas identificadas</div>'+li(d.falhas,'var(--red)')+'</div>';
  h+='<div class="card"><div class="ct" style="color:var(--amber)">O que corrigir</div>'+li(d.o_que_corrigir,'var(--amber)')+'</div>';
  h+='<div class="card"><div class="ct" style="color:#93C5FD">Como melhorar</div>'+li(d.como_melhorar,'#93C5FD')+'</div>';
  if(d.objecoes_identificadas&&d.objecoes_identificadas.length){h+='<div class="card"><div class="ct" style="color:var(--amber)">Objecoes mapeadas</div>';d.objecoes_identificadas.forEach(function(o){h+='<div style="background:rgba(245,158,11,.04);border-left:2px solid var(--amber);border-radius:0 var(--r) var(--r) 0;padding:10px 13px;margin-bottom:7px"><div style="color:var(--amber);font-size:13px;font-weight:500;margin-bottom:4px">❝ '+o.objecao+'</div><div style="font-size:13px;color:var(--text2)">→ '+o.como_foi_tratada+'</div></div>';});h+='</div>';}
  h+='<div class="rplay"><div style="font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:7px">🎭 Sugestao de roleplay</div><div style="font-size:14px;color:var(--text);line-height:1.7">'+(d.sugestao_roleplay||'')+'</div></div>';
  h+='<div class="coach"><div style="font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:7px">💬 Feedback do gestor</div><div style="font-size:14px;color:var(--text2);line-height:1.8;font-style:italic;font-weight:300">'+(d.resumo_coach||'')+'</div></div>';
  window._r=buildText(d);document.getElementById('rc').innerHTML=h;document.getElementById('result').style.display='block';document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}
function copiar(){if(!window._r)return;var b=document.querySelector('.btn-copy');function fb(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');b.textContent='✓ Copiado!';}catch(e){}document.body.removeChild(ta);setTimeout(function(){b.textContent='↗ Copiar relatorio';},2000);}if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(window._r).then(function(){b.textContent='✓ Copiado!';setTimeout(function(){b.textContent='↗ Copiar relatorio';},2000);}).catch(function(){fb(window._r);})}else{fb(window._r)}}
</script></body></html>
